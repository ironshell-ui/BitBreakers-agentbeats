[green_agent]
image = "ghcr.io/ironshell-ui/bitbreakers-agentbeats-medagentbench-evaluator:latest"
env = {}

[[participants]]
image = "ghcr.io/ironshell-ui/claudecowork-agent:latest"
name = "agent"
env = { DEEPSEEK_API_KEY = "${DEEPSEEK_API_KEY}", KIMI_API_KEY = "${KIMI_API_KEY}", MINIMAX_API_KEY = "${MINIMAX_API_KEY}", SERPAPI_KEY = "${SERPAPI_KEY}", OPENAI_API_KEY = "${OPENAI_API_KEY}" }

[config]
num_tasks = 50
max_rounds = 8
domain = "medagentbench"
num_workers = 2
